<!doctype html>
<html>
  <head>
    <title>Secret Letter</title>
    <style>
      body {
        text-align: center;
        font-family: Arial;
        background: #fce4ec;
      }
      .box {
        margin-top: 100px;
      }
      input {
        padding: 10px;
        margin: 10px;
      }
      button {
        padding: 10px 20px;
        background: pink;
        border: none;
        cursor: pointer;
      }
      #step2,
      #message {
        display: none;
      }
    </style>
  </head>
  <body>
    <div class="box">
      <!-- Bước 1: password -->
      <div id="step1">
        <h2>🔒 Nhập mật khẩu</h2>
        <input type="password" id="pass" />
        <br />
        <button onclick="checkPass()">Mở</button>
      </div>

      <!-- Bước 2: chọn số -->
      <div id="step2">
        <h2>✨ Từ 1 đến 10 hãy nhập một số để mở ✨</h2>
        <input type="number" id="number" min="1" max="10" />
        <br />
        <button onclick="checkNumber()">Tiếp tục</button>
      </div>

      <!-- Thư -->
      <div id="message">
        <h2>💌 Thư bí mật</h2>
        <p>
          Đây là bức thư dành riêng cho bạn... 💖<br />
          Hy vọng bạn sẽ luôn vui vẻ và hạnh phúc!
        </p>
      </div>
    </div>

    <script>
      function checkPass() {
        var p = document.getElementById("pass").value;
        if (p === "1234") {
          document.getElementById("step1").style.display = "none";
          document.getElementById("step2").style.display = "block";
        } else {
          alert("Sai mật khẩu!");
        }
      }

      function checkNumber() {
        var n = document.getElementById("number").value;
        if (n == 7) {
          document.getElementById("step2").style.display = "none";
          document.getElementById("message").style.display = "block";
        } else {
          alert("Sai rồi 😏 thử lại đi!");
        }
      }
    </script>
  </body>
</html>
